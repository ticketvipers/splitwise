name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db

  typecheck:
    name: Typecheck (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
