name: Backend CI
on:
  pull_request:
    paths: ['splitwise-backend/**']
  push:
    branches: [main]
    paths: ['splitwise-backend/**']
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: splitwise-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: splitwise-backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
