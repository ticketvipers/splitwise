[pytest]
# Collect only the canonical test suite from repo root.
# The repo contains multiple vendored/copy directories (splitwise*, worktrees/)
# with duplicate `tests/` packages that otherwise trigger
# `import file mismatch` during collection.
testpaths =
    tests
norecursedirs =
    .git
    .openclaw
    node_modules
    worktrees
    splitwise
    splitwise-app
    splitwise-backend
    **/__pycache__

# Use importlib so same-named test modules in other folders can't shadow
# the canonical ones if they end up on sys.path.
addopts = --import-mode=importlib
